name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev
      region:
        description: 'AWS region'
        required: true
        default: 'ap-south-1'
      workspace:
        description: 'Terraform workspace'
        required: false
        default: 'default'
      services:
        description: 'Comma-separated services (ec2,s3,rds,...)'
        required: true
        default: 'vpc,ec2,rds'
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options: [plan, apply]
        default: plan
      role_arn:
        description: 'IAM Role ARN (optional)'
        required: false
        default: ''

env:
  TF_VERSION: '1.7.0'
  TF_DIR: '.'

jobs:
  terraform:
    name: 'Terraform ${{ github.event.inputs.action }} — ${{ github.event.inputs.environment }}'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ github.event.inputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init

      - name: Select Terraform Workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WORKSPACE="${{ github.event.inputs.workspace }}"
          terraform workspace select "$WORKSPACE" || terraform workspace new "$WORKSPACE"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=${{ github.event.inputs.services }}" \
            -out=plan.out \
            -no-color

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply \
            -auto-approve \
            -no-color \
            plan.out

      - name: Terraform Output
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: ${{ env.TF_DIR }}
        run: terraform output -no-color
