##############################################################################
#  TerraConsole — terraform-deploy.yml
#
#  PIPELINE FOR plan:    prerequisites -> validate -> plan
#  PIPELINE FOR apply:   prerequisites -> validate -> plan -> apply
#  PIPELINE FOR destroy: prerequisites -> validate -> destroy-plan -> destroy
#
#  Required GitHub Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
##############################################################################

name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev
      region:
        description: 'AWS region'
        required: true
        default: 'ap-south-1'
      workspace:
        description: 'Terraform workspace'
        required: false
        default: 'default'
      services:
        description: 'Comma-separated services (ec2,s3,vpc,rds,iam,lambda,ecs,...)'
        required: true
        default: 'vpc'
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan
      services_to_destroy:
        description: '[destroy] Services to delete e.g. s3,ec2 (blank = same as services)'
        required: false
        default: ''
      all_deployed_services:
        description: '[destroy] All currently deployed services e.g. vpc,ec2,s3'
        required: false
        default: ''
      role_arn:
        description: 'IAM Role ARN to assume (optional)'
        required: false
        default: ''
      existing_vpc_id:
        description: 'Existing VPC ID (when vpc not in services)'
        required: false
        default: ''
      existing_subnet_ids:
        description: 'Existing subnet IDs comma-separated (when vpc not in services)'
        required: false
        default: ''
      tf_version:
        description: 'Terraform version'
        required: false
        default: '1.7.5'

env:
  TF_DIR: '.'
  AWS_DEFAULT_REGION: ${{ github.event.inputs.region }}
  AWS_REGION:         ${{ github.event.inputs.region }}

jobs:

# ============================================================================
#  JOB 1 — prerequisites
# ============================================================================
  prerequisites:
    name: 'Prerequisites'
    runs-on: ubuntu-latest
    outputs:
      tf_version:            ${{ steps.out.outputs.tf_version }}
      services_to_destroy:   ${{ steps.out.outputs.services_to_destroy }}
      all_deployed_services: ${{ steps.out.outputs.all_deployed_services }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          echo "Action:      ${{ github.event.inputs.action }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Region:      ${{ github.event.inputs.region }}"
          echo "Services:    ${{ github.event.inputs.services }}"
          echo "Workspace:   ${{ github.event.inputs.workspace }}"
          if [ -z "${{ github.event.inputs.services }}" ]; then
            echo "services input is empty"; exit 1
          fi
          echo "All inputs valid"

      - name: Check AWS secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "AWS_ACCESS_KEY_ID secret not set"; exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "AWS_SECRET_ACCESS_KEY secret not set"; exit 1
          fi
          echo "AWS credentials configured"

      - name: Check Terraform files exist
        run: |
          ls ${{ env.TF_DIR }}/*.tf || { echo "No .tf files found"; exit 1; }
          echo "Terraform files found"

      - name: Set outputs
        id: out
        run: |
          D="${{ github.event.inputs.services_to_destroy }}"
          [ -z "$D" ] && D="${{ github.event.inputs.services }}"
          A="${{ github.event.inputs.all_deployed_services }}"
          [ -z "$A" ] && A="${{ github.event.inputs.services }}"
          echo "tf_version=${{ github.event.inputs.tf_version }}" >> $GITHUB_OUTPUT
          echo "services_to_destroy=$D"                            >> $GITHUB_OUTPUT
          echo "all_deployed_services=$A"                          >> $GITHUB_OUTPUT

      - name: Job summary
        run: |
          echo "## Prerequisites" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Inputs valid | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| AWS secrets | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform files | ✓ |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ github.event.inputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | ${{ github.event.inputs.services }} |" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 2 — validate
# ============================================================================
  validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    needs: prerequisites

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -no-color

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          if [ "$WS" = "default" ]; then
            terraform workspace select default 2>/dev/null || true
          else
            terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"
          fi
          echo "Active workspace: $(terraform workspace show)"

      - name: Terraform Format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive -no-color || echo "Format warning"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate -no-color

# ============================================================================
#  JOB 3 — plan
# ============================================================================
  plan:
    name: 'Plan'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate]
    if: ${{ github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -no-color

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform workspace select "${{ github.event.inputs.workspace }}" 2>/dev/null \
            || terraform workspace new "${{ github.event.inputs.workspace }}"

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          # Write a tfvars file for list-type vars — avoids shell quoting issues
          RAW_SUBNETS="${{ github.event.inputs.existing_subnet_ids }}"
          EXISTING_VPC="${{ github.event.inputs.existing_vpc_id }}"

          # Build subnet list in HCL format: ["id1","id2"]
          if [ -n "$RAW_SUBNETS" ]; then
            SUBNET_HCL=$(echo "$RAW_SUBNETS" | tr ',' '\n' | \
              awk '{gsub(/^[[:space:]]+|[[:space:]]+$/,"")} NF' | \
              awk 'BEGIN{printf "["} NR>1{printf ","} {printf "\"%s\"", $0} END{printf "]"}')
          else
            SUBNET_HCL="[]"
          fi

          printf 'existing_vpc_id     = "%s"\nexisting_subnet_ids = %s\n' "$EXISTING_VPC" "$SUBNET_HCL" > /tmp/extra.tfvars
          echo "=== extra.tfvars ===" && cat /tmp/extra.tfvars

          terraform plan \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=${{ github.event.inputs.services }}" \
            -var-file=/tmp/extra.tfvars \
            -out=plan.out \
            -input=false \
            -no-color \
            2>&1 | tee plan-output.txt
          grep -E "to add|to change|to destroy|No changes|Plan:" plan-output.txt | tail -5 || true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: |
            ${{ env.TF_DIR }}/plan.out
            ${{ env.TF_DIR }}/plan-output.txt
          retention-days: 7

      - name: Job summary
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "## Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "to add|to change|to destroy|No changes|Plan:" plan-output.txt | tail -5 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 4 — apply
# ============================================================================
  apply:
    name: 'Apply'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate, plan]
    if: ${{ github.event.inputs.action == 'apply' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -no-color

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform workspace select "${{ github.event.inputs.workspace }}" 2>/dev/null \
            || terraform workspace new "${{ github.event.inputs.workspace }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.TF_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -input=false -no-color plan.out

      - name: Terraform Outputs
        working-directory: ${{ env.TF_DIR }}
        run: terraform output -no-color 2>/dev/null || echo "No outputs defined"

      - name: Job summary
        run: |
          echo "## Apply Complete ✓" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | ${{ github.event.inputs.services }} |" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 5 — destroy-plan
#
#  KEY FIX: Uses module prefix lookup (module.s3, module.vpc, etc.)
#           NOT flat resource names (aws_s3_bucket.main etc.)
#           Writes targets to /tmp/targets.txt — avoids all quoting/eval issues
# ============================================================================
  destroy-plan:
    name: 'Destroy Plan'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate]
    if: ${{ github.event.inputs.action == 'destroy' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -no-color

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform workspace select "${{ github.event.inputs.workspace }}" 2>/dev/null \
            || terraform workspace new "${{ github.event.inputs.workspace }}"

      - name: Resolve target resources from state
        id: targets
        working-directory: ${{ env.TF_DIR }}
        run: |
          DESTROY_SVCS="${{ needs.prerequisites.outputs.services_to_destroy }}"
          ALL_SVCS="${{ needs.prerequisites.outputs.all_deployed_services }}"

          echo "Services to destroy: $DESTROY_SVCS"
          echo "All deployed services: $ALL_SVCS"
          echo "=== Full terraform state list ==="
          terraform state list 2>/dev/null || echo "(state empty)"
          echo "================================="

          # Map service name -> module prefix in terraform state
          # State entries look like: module.s3[0].aws_s3_bucket.main
          # So we grep by "module.<service>" prefix
          declare -A M
          M[vpc]="module.vpc"
          M[ec2]="module.ec2"
          M[rds]="module.rds"
          M[s3]="module.s3"
          M[iam]="module.iam"
          M[lambda]="module.lambda"
          M[ecs]="module.ecs"
          M[alb]="module.alb"
          M[route53]="module.route53"
          M[ssm]="module.ssm"
          M[ecr]="module.ecr"
          M[sns]="module.sns"
          M[sqs]="module.sqs"
          M[cloudfront]="module.cloudfront"
          M[secretsmanager]="module.secretsmanager"

          # Write each matching resource address to a file (one per line)
          # Using a file avoids all shell quoting / eval issues
          > /tmp/targets.txt

          IFS=',' read -ra SVCS <<< "$DESTROY_SVCS"
          for SVC in "${SVCS[@]}"; do
            SVC=$(echo "$SVC" | xargs)   # trim whitespace
            PREFIX="${M[$SVC]}"
            if [ -z "$PREFIX" ]; then
              echo "  WARNING: no module mapping for service '$SVC' — skipping"
              continue
            fi
            echo "  Searching state for prefix: $PREFIX"
            while IFS= read -r R; do
              if [ -n "$R" ]; then
                echo "$R" >> /tmp/targets.txt
                echo "    -> targeted: $R"
              fi
            done <<< "$(terraform state list 2>/dev/null | grep "^${PREFIX}" || true)"
          done

          COUNT=$(wc -l < /tmp/targets.txt | tr -d ' ')
          echo "target_count=$COUNT" >> $GITHUB_OUTPUT
          echo "=== Targets found: $COUNT ==="
          cat /tmp/targets.txt || true

      - name: Destroy plan preview
        working-directory: ${{ env.TF_DIR }}
        run: |
          COUNT="${{ steps.targets.outputs.target_count }}"
          ALL_SVCS="${{ needs.prerequisites.outputs.all_deployed_services }}"

          if [ -z "$COUNT" ] || [ "$COUNT" = "0" ]; then
            echo "No resources found in state for: ${{ needs.prerequisites.outputs.services_to_destroy }}"
            echo "They may not be applied yet, or were already destroyed."
            exit 0
          fi

          echo "Planning destroy for $COUNT resources..."

          # Build -target array from file — no eval, no quoting problems
          TARGET_ARGS=()
          while IFS= read -r R; do
            [ -n "$R" ] && TARGET_ARGS+=(-target="$R")
          done < /tmp/targets.txt


          RAW_SUBNETS="${{ github.event.inputs.existing_subnet_ids }}"
          EXISTING_VPC="${{ github.event.inputs.existing_vpc_id }}"
          if [ -n "$RAW_SUBNETS" ]; then
            SUBNET_HCL=$(echo "$RAW_SUBNETS" | tr ',' '\n' | \
              awk '{gsub(/^[[:space:]]+|[[:space:]]+$/,"")} NF' | \
              awk 'BEGIN{printf "["} NR>1{printf ","} {printf "\"%s\"", $0} END{printf "]"}')
          else
            SUBNET_HCL="[]"
          fi
          printf 'existing_vpc_id     = "%s"\nexisting_subnet_ids = %s\n' "$EXISTING_VPC" "$SUBNET_HCL" > /tmp/extra.tfvars

          terraform plan -destroy \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=$ALL_SVCS" \
            -var-file=/tmp/extra.tfvars \
            "${TARGET_ARGS[@]}" \
            -out=destroy-plan.out \
            -input=false -no-color \
            2>&1 | tee destroy-preview.txt || true

          echo "=== Resources that WILL be destroyed ==="
          grep "will be destroyed\|to destroy" destroy-preview.txt | head -30 \
            || echo "No matching resources found"

      - name: Upload destroy plan
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: |
            ${{ env.TF_DIR }}/destroy-plan.out
            ${{ env.TF_DIR }}/destroy-preview.txt
          retention-days: 1
          if-no-files-found: warn

      - name: Job summary
        env:
          TARGETING: ${{ needs.prerequisites.outputs.services_to_destroy }}
        run: |
          echo "## Destroy Plan Preview" >> $GITHUB_STEP_SUMMARY
          echo "**Targeting (will delete):** $TARGETING" >> $GITHUB_STEP_SUMMARY
          echo "**Keeping alive:** All other deployed services" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 6 — destroy
#
#  Same module-prefix approach as destroy-plan.
#  Rebuilds target list fresh (different runner, /tmp is empty again).
# ============================================================================
  destroy:
    name: 'Destroy'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate, destroy-plan]
    if: ${{ github.event.inputs.action == 'destroy' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -no-color

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform workspace select "${{ github.event.inputs.workspace }}" 2>/dev/null \
            || terraform workspace new "${{ github.event.inputs.workspace }}"

      - name: Selective Destroy
        working-directory: ${{ env.TF_DIR }}
        run: |
          DESTROY_SVCS="${{ needs.prerequisites.outputs.services_to_destroy }}"
          ALL_SVCS="${{ needs.prerequisites.outputs.all_deployed_services }}"

          declare -A M
          M[vpc]="module.vpc"
          M[ec2]="module.ec2"
          M[rds]="module.rds"
          M[s3]="module.s3"
          M[iam]="module.iam"
          M[lambda]="module.lambda"
          M[ecs]="module.ecs"
          M[alb]="module.alb"
          M[route53]="module.route53"
          M[ssm]="module.ssm"
          M[ecr]="module.ecr"
          M[sns]="module.sns"
          M[sqs]="module.sqs"
          M[cloudfront]="module.cloudfront"
          M[secretsmanager]="module.secretsmanager"

          echo "=== Current state ==="
          terraform state list 2>/dev/null || echo "(empty)"

          # Build target list fresh on this runner
          > /tmp/targets.txt
          IFS=',' read -ra SVCS <<< "$DESTROY_SVCS"
          for SVC in "${SVCS[@]}"; do
            SVC=$(echo "$SVC" | xargs)
            PREFIX="${M[$SVC]}"
            [ -z "$PREFIX" ] && echo "WARNING: no mapping for '$SVC'" && continue
            while IFS= read -r R; do
              [ -n "$R" ] && echo "$R" >> /tmp/targets.txt && echo "  Targeting: $R"
            done <<< "$(terraform state list 2>/dev/null | grep "^${PREFIX}" || true)"
          done

          if [ ! -s /tmp/targets.txt ]; then
            echo "Nothing to destroy — no matching resources found in state."
            echo "May not be applied yet, or already destroyed."
            exit 0
          fi

          # Build bash array — no eval, no quoting problems
          TARGET_ARGS=()
          while IFS= read -r R; do
            [ -n "$R" ] && TARGET_ARGS+=(-target="$R")
          done < /tmp/targets.txt

          echo "========================================"
          echo "  Selective Terraform Destroy"
          echo "  Destroying:  $DESTROY_SVCS"
          echo "  Keeping:     All other services"
          echo "  Environment: ${{ github.event.inputs.environment }}"
          echo "========================================"


          RAW_SUBNETS="${{ github.event.inputs.existing_subnet_ids }}"
          EXISTING_VPC="${{ github.event.inputs.existing_vpc_id }}"
          if [ -n "$RAW_SUBNETS" ]; then
            SUBNET_HCL=$(echo "$RAW_SUBNETS" | tr ',' '\n' | \
              awk '{gsub(/^[[:space:]]+|[[:space:]]+$/,"")} NF' | \
              awk 'BEGIN{printf "["} NR>1{printf ","} {printf "\"%s\"", $0} END{printf "]"}')
          else
            SUBNET_HCL="[]"
          fi
          printf 'existing_vpc_id     = "%s"\nexisting_subnet_ids = %s\n' "$EXISTING_VPC" "$SUBNET_HCL" > /tmp/extra.tfvars

          terraform destroy \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=$ALL_SVCS" \
            -var-file=/tmp/extra.tfvars \
            "${TARGET_ARGS[@]}" \
            -auto-approve \
            -input=false \
            -no-color

          echo "✅ Selective destroy complete!"
          echo "Destroyed: $DESTROY_SVCS"
          echo "All other services remain untouched."

      - name: Job summary
        env:
          DESTROYED: ${{ needs.prerequisites.outputs.services_to_destroy }}
          ENV_NAME:  ${{ github.event.inputs.environment }}
        run: |
          echo "## Destroy Complete ✓" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Destroyed | $DESTROYED |" >> $GITHUB_STEP_SUMMARY
          echo "| Kept alive | All other services |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $ENV_NAME |" >> $GITHUB_STEP_SUMMARY
