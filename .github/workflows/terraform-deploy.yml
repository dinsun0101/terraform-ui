##################################################################################################

##############################################################################
#  TerraConsole — terraform-deploy.yml
#  Single workflow, sequential jobs with dependencies.
#
#  PIPELINE FOR plan:
#    prerequisites → validate → plan
#
#  PIPELINE FOR apply:
#    prerequisites → validate → plan → apply
#
#  PIPELINE FOR destroy:
#    prerequisites → validate → destroy-plan → destroy
#
#  Required GitHub Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
##############################################################################

name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev
      region:
        description: 'AWS region'
        required: true
        default: 'ap-south-1'
      workspace:
        description: 'Terraform workspace'
        required: false
        default: 'default'
      services:
        description: 'Comma-separated services (ec2,s3,vpc,rds,iam,lambda,ecs,...)'
        required: true
        default: 'vpc'
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan
      services_to_destroy:
        description: '[destroy] Services to delete (blank = same as services)'
        required: false
        default: ''
      all_deployed_services:
        description: '[destroy] All currently deployed services in this env'
        required: false
        default: ''
      role_arn:
        description: 'IAM Role ARN to assume (optional)'
        required: false
        default: ''
      tf_version:
        description: 'Terraform version'
        required: false
        default: '1.7.5'

env:
  TF_DIR: '.'

jobs:

# ============================================================================
#  JOB 1 — prerequisites
#  Validates inputs, checks secrets and tf files before anything runs.
# ============================================================================
  prerequisites:
    name: 'Prerequisites'
    runs-on: ubuntu-latest
    outputs:
      tf_version:            ${{ steps.out.outputs.tf_version }}
      services_to_destroy:   ${{ steps.out.outputs.services_to_destroy }}
      all_deployed_services: ${{ steps.out.outputs.all_deployed_services }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          echo "Action:      ${{ github.event.inputs.action }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Region:      ${{ github.event.inputs.region }}"
          echo "Services:    ${{ github.event.inputs.services }}"
          echo "Workspace:   ${{ github.event.inputs.workspace }}"
          REGION="${{ github.event.inputs.region }}"
          if [[ ! "$REGION" =~ ^[a-z]{2}-[a-z]+-[0-9]+$ ]]; then
            echo "Invalid region format: $REGION"; exit 1
          fi
          if [ -z "${{ github.event.inputs.services }}" ]; then
            echo "services input is empty"; exit 1
          fi
          echo "All inputs valid"

      - name: Check AWS secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "AWS_ACCESS_KEY_ID secret not set"; exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "AWS_SECRET_ACCESS_KEY secret not set"; exit 1
          fi
          echo "AWS credentials configured"

      - name: Check Terraform files
        run: |
          ls ${{ env.TF_DIR }}/*.tf || { echo "No .tf files found"; exit 1; }
          echo "Terraform files found"

      - name: Prod destroy warning
        if: ${{ github.event.inputs.action == 'destroy' && github.event.inputs.environment == 'prod' }}
        run: echo "WARNING - Destroying resources in PRODUCTION"

      - name: Set outputs
        id: out
        run: |
          D="${{ github.event.inputs.services_to_destroy }}"
          [ -z "$D" ] && D="${{ github.event.inputs.services }}"
          A="${{ github.event.inputs.all_deployed_services }}"
          [ -z "$A" ] && A="${{ github.event.inputs.services }}"
          echo "tf_version=${{ github.event.inputs.tf_version }}"  >> $GITHUB_OUTPUT
          echo "services_to_destroy=$D"                             >> $GITHUB_OUTPUT
          echo "all_deployed_services=$A"                           >> $GITHUB_OUTPUT

      - name: Job summary
        run: |
          echo "## Prerequisites" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Inputs valid | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| AWS secrets configured | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform files found | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ github.event.inputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ github.event.inputs.region }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | ${{ github.event.inputs.services }} |" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 2 — validate
#  terraform init + fmt-check + validate
#  Depends on: prerequisites
# ============================================================================
  validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    needs: prerequisites

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform version
        run: terraform version

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false -no-color \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate"

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          if [ "$WS" = "default" ]; then
            terraform workspace select default 2>/dev/null || true
          else
            terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"
          fi
          echo "Workspace: $(terraform workspace show)"

      - name: Terraform Format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive -no-color || echo "Format warning - run terraform fmt"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate -no-color

      - name: Job summary
        run: |
          echo "## Validate" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| terraform init | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| workspace | ${{ github.event.inputs.workspace }} |" >> $GITHUB_STEP_SUMMARY
          echo "| terraform validate | passed |" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 3 — plan
#  terraform plan — only for plan/apply actions
#  Depends on: validate
# ============================================================================
  plan:
    name: 'Plan'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate]
    if: ${{ github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false -no-color \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate"

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=${{ github.event.inputs.services }}" \
            -out=plan.out \
            -input=false \
            -no-color \
            2>&1 | tee plan-output.txt
          grep -E "^Plan:|to add|to change|to destroy|No changes" plan-output.txt | tail -3 || true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: |
            ${{ env.TF_DIR }}/plan.out
            ${{ env.TF_DIR }}/plan-output.txt
          retention-days: 7

      - name: Job summary
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "## Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "to add|to change|to destroy|No changes|Plan:" plan-output.txt | tail -5 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 4 — apply
#  Downloads plan artifact and runs terraform apply
#  Depends on: plan (only runs if plan succeeded)
# ============================================================================
  apply:
    name: 'Apply'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate, plan]
    if: ${{ github.event.inputs.action == 'apply' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false -no-color \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate"

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.TF_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -no-color \
            plan.out

      - name: Terraform Outputs
        working-directory: ${{ env.TF_DIR }}
        run: terraform output -no-color 2>/dev/null || echo "No outputs defined"

      - name: Job summary
        run: |
          echo "## Apply" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Applied successfully |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | ${{ github.event.inputs.services }} |" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 5 — destroy-plan
#  Generates a destroy preview showing ONLY the targeted resources.
#  Depends on: validate
# ============================================================================
  destroy-plan:
    name: 'Destroy Plan'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate]
    if: ${{ github.event.inputs.action == 'destroy' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false -no-color \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate"

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"

      - name: Resolve target resources from state
        id: targets
        working-directory: ${{ env.TF_DIR }}
        run: |
          DESTROY_SVCS="${{ needs.prerequisites.outputs.services_to_destroy }}"
          ALL_SVCS="${{ needs.prerequisites.outputs.all_deployed_services }}"

          echo "=== DEBUG ==="
          echo "DESTROY_SVCS : $DESTROY_SVCS"
          echo "ALL_SVCS     : $ALL_SVCS"
          echo "=== Full state list ==="
          terraform state list 2>/dev/null || echo "(state empty or unreachable)"
          echo "============="

          declare -A M
          M[vpc]="module.vpc" M[ec2]="module.ec2" M[rds]="module.rds"
          M[s3]="module.s3" M[iam]="module.iam" M[lambda]="module.lambda"
          M[ecs]="module.ecs" M[alb]="module.alb" M[route53]="module.route53"
          M[ssm]="module.ssm" M[ecr]="module.ecr" M[sns]="module.sns"
          M[sqs]="module.sqs" M[cloudfront]="module.cloudfront"
          M[secretsmanager]="module.secretsmanager"

          # NOTE: Do NOT run terraform plan/refresh here — it can silently
          # remove resources from the local state view if enabled_services
          # doesn't include all deployed modules. Build FLAGS directly from
          # the raw state list instead.

          FLAGS=""
          IFS=',' read -ra SVCS <<< "$DESTROY_SVCS"
          for SVC in "${SVCS[@]}"; do
            SVC=$(echo "$SVC" | xargs)
            PREFIX="${M[$SVC]}"
            [ -z "$PREFIX" ] && continue
            echo "Looking for resources matching: ${PREFIX}"
            while IFS= read -r R; do
              if [ -n "$R" ]; then
                FLAGS="$FLAGS -target='$R'"
                echo "  -> targeted: $R"
              fi
            done <<< "$(terraform state list 2>/dev/null | grep "^${PREFIX}" || true)"
          done

          echo "=== Final FLAGS ==="
          echo "$FLAGS"
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: Destroy plan preview
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_FLAGS: ${{ steps.targets.outputs.flags }}
        run: |
          ALL_SVCS="${{ needs.prerequisites.outputs.all_deployed_services }}"

          if [ -z "$TF_FLAGS" ]; then
            echo "No resources found in state for the selected services."
            echo "These services may not have been applied yet, or were already destroyed."
            exit 0
          fi

          echo "Planning destroy for: ${{ needs.prerequisites.outputs.services_to_destroy }}"
          echo "Target flags: $TF_FLAGS"

          eval terraform plan -destroy \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=$ALL_SVCS" \
            $TF_FLAGS \
            -out=destroy-plan.out -input=false -no-color \
            2>&1 | tee destroy-preview.txt || true

          echo "=== Resources that WILL be destroyed ==="
          grep "will be destroyed\|to destroy" destroy-preview.txt | head -30 || echo "No matching resources found in state"

      - name: Upload destroy plan
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: |
            ${{ env.TF_DIR }}/destroy-plan.out
            ${{ env.TF_DIR }}/destroy-preview.txt
          retention-days: 1

      - name: Job summary
        env:
          TARGETING: ${{ needs.prerequisites.outputs.services_to_destroy }}
        run: |
          echo "## Destroy Plan Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "**Targeting:** $TARGETING" >> "$GITHUB_STEP_SUMMARY"
          echo "**Keeping:** All other services untouched" >> "$GITHUB_STEP_SUMMARY" 

# ============================================================================
#  JOB 6 — destroy
#  Runs selective destroy using -target flags
#  Depends on: destroy-plan (only runs if destroy-plan succeeded)
# ============================================================================
  destroy:
    name: 'Destroy'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate, destroy-plan]
    if: ${{ github.event.inputs.action == 'destroy' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false -no-color \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate"

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"

      - name: Selective Destroy
        working-directory: ${{ env.TF_DIR }}
        run: |
          DESTROY_SVCS="${{ needs.prerequisites.outputs.services_to_destroy }}"
          ALL_SVCS="${{ needs.prerequisites.outputs.all_deployed_services }}"
          declare -A M
          M[vpc]="module.vpc" M[ec2]="module.ec2" M[rds]="module.rds"
          M[s3]="module.s3" M[iam]="module.iam" M[lambda]="module.lambda"
          M[ecs]="module.ecs" M[alb]="module.alb" M[route53]="module.route53"
          M[ssm]="module.ssm" M[ecr]="module.ecr" M[sns]="module.sns"
          M[sqs]="module.sqs" M[cloudfront]="module.cloudfront"
          M[secretsmanager]="module.secretsmanager"

          FLAGS=""
          IFS=',' read -ra SVCS <<< "$DESTROY_SVCS"
          for SVC in "${SVCS[@]}"; do
            SVC=$(echo "$SVC" | xargs)
            PREFIX="${M[$SVC]}"
            [ -z "$PREFIX" ] && continue
            while IFS= read -r R; do
              [ -n "$R" ] && FLAGS="$FLAGS -target='$R'"
            done <<< "$(terraform state list 2>/dev/null | grep "^${PREFIX}" || true)"
          done

          if [ -z "$FLAGS" ]; then
            echo "Nothing to destroy — no matching resources found in Terraform state."
            echo "These services may not have been applied yet, or were already destroyed."
            echo "DESTROY_RESULT=nothing_found" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "========================================"
          echo "  Selective Terraform Destroy"
          echo "  Destroying:  $DESTROY_SVCS"
          echo "  Keeping:     All other services"
          echo "  Environment: ${{ github.event.inputs.environment }}"
          echo "========================================"

          eval terraform destroy \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=$ALL_SVCS" \
            $FLAGS \
            -auto-approve -input=false -no-color

          echo "Selective destroy complete!"
          echo "Destroyed: $DESTROY_SVCS"
          echo "All other services remain untouched."
          echo "DESTROY_RESULT=success" >> "$GITHUB_ENV"

      - name: Job summary
        run: |
          echo "## Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Destroyed | ${{ needs.prerequisites.outputs.services_to_destroy }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
