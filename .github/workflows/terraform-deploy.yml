##############################################################################
#  TerraConsole — terraform-deploy.yml
#  Single workflow with sequential jobs and stage dependencies.
#
#  PIPELINE FOR plan:
#    prerequisites -> validate -> plan
#
#  PIPELINE FOR apply:
#    prerequisites -> validate -> plan -> apply
#
#  PIPELINE FOR destroy:
#    prerequisites -> validate -> destroy-plan -> destroy
#
#  Required GitHub Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
##############################################################################

name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev
      region:
        description: 'AWS region'
        required: true
        default: 'ap-south-1'
      workspace:
        description: 'Terraform workspace'
        required: false
        default: 'default'
      services:
        description: 'Comma-separated services (ec2,s3,vpc,rds,iam,lambda,ecs,...)'
        required: true
        default: 'vpc'
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan
      services_to_destroy:
        description: '[destroy] Services to delete e.g. s3,ec2 (blank = same as services)'
        required: false
        default: ''
      all_deployed_services:
        description: '[destroy] All currently deployed services e.g. vpc,ec2,s3'
        required: false
        default: ''
      role_arn:
        description: 'IAM Role ARN to assume (optional)'
        required: false
        default: ''
      tf_version:
        description: 'Terraform version'
        required: false
        default: '1.7.5'

env:
  TF_DIR: '.'

jobs:

# ============================================================================
#  JOB 1 — prerequisites
#  Validates inputs, checks secrets and tf files before anything runs.
#  ALL other jobs depend on this one.
# ============================================================================
  prerequisites:
    name: 'Prerequisites'
    runs-on: ubuntu-latest
    outputs:
      tf_version:            ${{ steps.out.outputs.tf_version }}
      services_to_destroy:   ${{ steps.out.outputs.services_to_destroy }}
      all_deployed_services: ${{ steps.out.outputs.all_deployed_services }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          echo "Action:      ${{ github.event.inputs.action }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Region:      ${{ github.event.inputs.region }}"
          echo "Services:    ${{ github.event.inputs.services }}"
          echo "Workspace:   ${{ github.event.inputs.workspace }}"
          REGION="${{ github.event.inputs.region }}"
          if [[ ! "$REGION" =~ ^[a-z]{2}-[a-z]+-[0-9]+$ ]]; then
            echo "Invalid region format: $REGION"; exit 1
          fi
          if [ -z "${{ github.event.inputs.services }}" ]; then
            echo "services input is empty"; exit 1
          fi
          echo "All inputs valid"

      - name: Check AWS secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "AWS_ACCESS_KEY_ID secret not set in GitHub repo settings"; exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "AWS_SECRET_ACCESS_KEY secret not set in GitHub repo settings"; exit 1
          fi
          echo "AWS credentials configured"

      - name: Check Terraform files exist
        run: |
          ls ${{ env.TF_DIR }}/*.tf || { echo "No .tf files found in repo root"; exit 1; }
          echo "Terraform files found"

      - name: Production destroy warning
        if: ${{ github.event.inputs.action == 'destroy' && github.event.inputs.environment == 'prod' }}
        run: echo "WARNING - Destroying resources in PRODUCTION environment"

      - name: Set outputs
        id: out
        run: |
          D="${{ github.event.inputs.services_to_destroy }}"
          [ -z "$D" ] && D="${{ github.event.inputs.services }}"
          A="${{ github.event.inputs.all_deployed_services }}"
          [ -z "$A" ] && A="${{ github.event.inputs.services }}"
          echo "tf_version=${{ github.event.inputs.tf_version }}" >> $GITHUB_OUTPUT
          echo "services_to_destroy=$D"                            >> $GITHUB_OUTPUT
          echo "all_deployed_services=$A"                          >> $GITHUB_OUTPUT

      - name: Job summary
        run: |
          echo "## Prerequisites" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Inputs valid | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| AWS secrets configured | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform files found | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ github.event.inputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ github.event.inputs.region }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | ${{ github.event.inputs.services }} |" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 2 — validate
#  terraform init + fmt-check + validate
#  Depends on: prerequisites
# ============================================================================
  validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    needs: prerequisites

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform version
        run: terraform version

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -no-color

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          if [ "$WS" = "default" ]; then
            terraform workspace select default 2>/dev/null || true
          else
            terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"
          fi
          echo "Active workspace: $(terraform workspace show)"

      - name: Terraform Format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive -no-color || echo "Format warning - run terraform fmt locally"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate -no-color

      - name: Job summary
        run: |
          echo "## Validate" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| terraform init | passed |" >> $GITHUB_STEP_SUMMARY
          echo "| workspace | ${{ github.event.inputs.workspace }} |" >> $GITHUB_STEP_SUMMARY
          echo "| terraform validate | passed |" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 3 — plan
#  terraform plan - only for plan/apply actions
#  Depends on: validate
# ============================================================================
  plan:
    name: 'Plan'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate]
    if: ${{ github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -no-color

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=${{ github.event.inputs.services }}" \
            -out=plan.out \
            -input=false \
            -no-color \
            2>&1 | tee plan-output.txt
          echo "--- Plan Summary ---"
          grep -E "to add|to change|to destroy|No changes|Plan:" plan-output.txt | tail -5 || true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: |
            ${{ env.TF_DIR }}/plan.out
            ${{ env.TF_DIR }}/plan-output.txt
          retention-days: 7

      - name: Job summary
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "## Plan" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          grep -E "to add|to change|to destroy|No changes|Plan:" plan-output.txt | tail -5 >> $GITHUB_STEP_SUMMARY || true
          echo "```" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 4 — apply
#  Downloads the plan artifact and runs terraform apply
#  Only runs when action = apply AND plan succeeded
#  Depends on: plan
# ============================================================================
  apply:
    name: 'Apply'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate, plan]
    if: ${{ github.event.inputs.action == 'apply' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -no-color

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.TF_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -no-color \
            plan.out

      - name: Terraform Outputs
        working-directory: ${{ env.TF_DIR }}
        run: terraform output -no-color 2>/dev/null || echo "No outputs defined"

      - name: Job summary
        run: |
          echo "## Apply" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Applied successfully |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Services | ${{ github.event.inputs.services }} |" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 5 — destroy-plan
#  Shows a preview of ONLY the targeted resources that will be deleted.
#  Runs only when action = destroy AND validate succeeded.
#  Depends on: validate
# ============================================================================
  destroy-plan:
    name: 'Destroy Plan'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate]
    if: ${{ github.event.inputs.action == 'destroy' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -no-color

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"

      - name: Resolve target resources from state
        id: targets
        working-directory: ${{ env.TF_DIR }}
        run: |
          DESTROY_SVCS="${{ needs.prerequisites.outputs.services_to_destroy }}"
          ALL_SVCS="${{ needs.prerequisites.outputs.all_deployed_services }}"

          echo "Services to destroy: $DESTROY_SVCS"
          echo "All deployed services: $ALL_SVCS"

          # Refresh state using ALL deployed services
          terraform plan \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=$ALL_SVCS" \
            -refresh-only -input=false -no-color 2>/dev/null || true

          # Map service name -> terraform resource prefixes
          declare -A RESOURCE_MAP
          RESOURCE_MAP[vpc]="aws_vpc.main aws_subnet.public aws_subnet.private aws_internet_gateway.igw data.aws_availability_zones.available"
          RESOURCE_MAP[ec2]="aws_instance.web aws_security_group.web data.aws_ami.amazon_linux"
          RESOURCE_MAP[rds]="aws_db_instance.main aws_db_subnet_group.main aws_security_group.rds random_password.db aws_ssm_parameter.db_password"
          RESOURCE_MAP[s3]="aws_s3_bucket.main aws_s3_bucket_versioning.main aws_s3_bucket_public_access_block.main random_id.suffix"
          RESOURCE_MAP[iam]="aws_iam_role.app aws_iam_role_policy.app_s3 aws_iam_role_policy_attachment.ssm aws_iam_instance_profile.app"
          RESOURCE_MAP[lambda]="aws_lambda_function.app aws_iam_role.lambda aws_iam_role_policy_attachment.lambda_basic aws_security_group.lambda"
          RESOURCE_MAP[ecs]="aws_ecs_cluster.main aws_ecs_cluster_capacity_providers.main aws_security_group.ecs"
          RESOURCE_MAP[alb]="aws_lb.main aws_lb_target_group.main aws_lb_listener.http"
          RESOURCE_MAP[route53]="aws_route53_zone.main"
          RESOURCE_MAP[ssm]="aws_ssm_parameter.db_password"
          RESOURCE_MAP[ecr]="aws_ecr_repository.app"
          RESOURCE_MAP[sns]="aws_sns_topic.main"
          RESOURCE_MAP[sqs]="aws_sqs_queue.main"
          RESOURCE_MAP[cloudfront]="aws_cloudfront_distribution.main"
          RESOURCE_MAP[secretsmanager]="aws_secretsmanager_secret.main"

          TARGET_FLAGS=""
          IFS=',' read -ra SVCS <<< "$DESTROY_SVCS"
          for SVC in "${SVCS[@]}"; do
            SVC=$(echo "$SVC" | xargs)
            PREFIXES="${RESOURCE_MAP[$SVC]}"
            [ -z "$PREFIXES" ] && continue
            echo "  Looking up state for: $SVC"
            for PREFIX in $PREFIXES; do
              RESOURCES=$(terraform state list 2>/dev/null | grep "^${PREFIX}" || true)
              if [ -n "$RESOURCES" ]; then
                while IFS= read -r R; do
                  echo "    Found: $R"
                  TARGET_FLAGS="$TARGET_FLAGS -target='$R'"
                done <<< "$RESOURCES"
              fi
            done
          done

          echo "flags=$TARGET_FLAGS" >> $GITHUB_OUTPUT
          echo "Target flags: $TARGET_FLAGS"

      - name: Destroy plan preview
        working-directory: ${{ env.TF_DIR }}
        run: |
          ALL_SVCS="${{ needs.prerequisites.outputs.all_deployed_services }}"
          FLAGS="${{ steps.targets.outputs.flags }}"

          if [ -z "$FLAGS" ]; then
            echo "No resources found in state for the selected services."
            exit 0
          fi

          eval terraform plan -destroy \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=$ALL_SVCS" \
            $FLAGS \
            -out=destroy-plan.out \
            -input=false -no-color \
            2>&1 | tee destroy-preview.txt || true

          echo "--- Resources that WILL be destroyed ---"
          grep "will be destroyed|to destroy" destroy-preview.txt | head -30 || echo "No matching resources found in state"

      - name: Upload destroy plan
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: |
            ${{ env.TF_DIR }}/destroy-plan.out
            ${{ env.TF_DIR }}/destroy-preview.txt
          retention-days: 1

      - name: Job summary
        run: |
          echo "## Destroy Plan Preview" >> $GITHUB_STEP_SUMMARY
          echo "**Targeting (will delete):** `${{ needs.prerequisites.outputs.services_to_destroy }}`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Keeping alive:** All other deployed services" >> $GITHUB_STEP_SUMMARY

# ============================================================================
#  JOB 6 — destroy
#  Selectively destroys ONLY the targeted resources using -target flags.
#  Only runs when destroy-plan succeeded.
#  Depends on: destroy-plan
# ============================================================================
  destroy:
    name: 'Destroy'
    runs-on: ubuntu-latest
    needs: [prerequisites, validate, destroy-plan]
    if: ${{ github.event.inputs.action == 'destroy' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:         ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key:     ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:                ${{ github.event.inputs.region }}
          role-to-assume:            ${{ github.event.inputs.role_arn }}
          role-skip-session-tagging: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ needs.prerequisites.outputs.tf_version }}

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -input=false -no-color

      - name: Select workspace
        working-directory: ${{ env.TF_DIR }}
        run: |
          WS="${{ github.event.inputs.workspace }}"
          terraform workspace select "$WS" 2>/dev/null || terraform workspace new "$WS"

      - name: Selective Destroy
        working-directory: ${{ env.TF_DIR }}
        run: |
          DESTROY_SVCS="${{ needs.prerequisites.outputs.services_to_destroy }}"
          ALL_SVCS="${{ needs.prerequisites.outputs.all_deployed_services }}"

          echo "========================================"
          echo "  Selective Terraform Destroy"
          echo "  Destroying:  $DESTROY_SVCS"
          echo "  Keeping:     All other services"
          echo "  Environment: ${{ github.event.inputs.environment }}"
          echo "========================================"

          # Map service name -> terraform resource prefixes
          declare -A RESOURCE_MAP
          RESOURCE_MAP[vpc]="aws_vpc.main aws_subnet.public aws_subnet.private aws_internet_gateway.igw data.aws_availability_zones.available"
          RESOURCE_MAP[ec2]="aws_instance.web aws_security_group.web data.aws_ami.amazon_linux"
          RESOURCE_MAP[rds]="aws_db_instance.main aws_db_subnet_group.main aws_security_group.rds random_password.db aws_ssm_parameter.db_password"
          RESOURCE_MAP[s3]="aws_s3_bucket.main aws_s3_bucket_versioning.main aws_s3_bucket_public_access_block.main random_id.suffix"
          RESOURCE_MAP[iam]="aws_iam_role.app aws_iam_role_policy.app_s3 aws_iam_role_policy_attachment.ssm aws_iam_instance_profile.app"
          RESOURCE_MAP[lambda]="aws_lambda_function.app aws_iam_role.lambda aws_iam_role_policy_attachment.lambda_basic aws_security_group.lambda"
          RESOURCE_MAP[ecs]="aws_ecs_cluster.main aws_ecs_cluster_capacity_providers.main aws_security_group.ecs"
          RESOURCE_MAP[alb]="aws_lb.main aws_lb_target_group.main aws_lb_listener.http"
          RESOURCE_MAP[route53]="aws_route53_zone.main"
          RESOURCE_MAP[ssm]="aws_ssm_parameter.db_password"
          RESOURCE_MAP[ecr]="aws_ecr_repository.app"
          RESOURCE_MAP[sns]="aws_sns_topic.main"
          RESOURCE_MAP[sqs]="aws_sqs_queue.main"
          RESOURCE_MAP[cloudfront]="aws_cloudfront_distribution.main"
          RESOURCE_MAP[secretsmanager]="aws_secretsmanager_secret.main"

          # Build -target flags from actual terraform state
          TARGET_FLAGS=""
          IFS=',' read -ra SVCS <<< "$DESTROY_SVCS"
          for SVC in "${SVCS[@]}"; do
            SVC=$(echo "$SVC" | xargs)
            PREFIXES="${RESOURCE_MAP[$SVC]}"
            [ -z "$PREFIXES" ] && continue
            for PREFIX in $PREFIXES; do
              RESOURCES=$(terraform state list 2>/dev/null | grep "^${PREFIX}" || true)
              [ -z "$RESOURCES" ] && continue
              while IFS= read -r R; do
                echo "  Targeting: $R"
                TARGET_FLAGS="$TARGET_FLAGS -target='$R'"
              done <<< "$RESOURCES"
            done
          done

          if [ -z "$TARGET_FLAGS" ]; then
            echo "Nothing to destroy — no matching resources found in Terraform state."
            echo "These services may not have been applied yet, or were already destroyed."
            exit 0
          fi

          echo ""
          echo "Running selective destroy..."
          eval terraform destroy \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="enabled_services=$ALL_SVCS" \
            $TARGET_FLAGS \
            -auto-approve \
            -input=false \
            -no-color

          echo ""
          echo "Selective destroy complete!"
          echo "Destroyed: $DESTROY_SVCS"
          echo "All other services remain untouched."

      - name: Job summary
        run: |
          echo "## Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Destroyed | ${{ needs.prerequisites.outputs.services_to_destroy }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kept alive | All other services |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
